name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: obtrace-runners
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - run: go build ./...
      - run: go test ./...
      - run: go vet ./...

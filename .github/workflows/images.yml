name: Build & Push Image

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: build-mcp
  cancel-in-progress: true

env:
  REGISTRY: obtrace-registry.obtrace-infra.svc.cluster.local:5000

jobs:
  build-deploy:
    runs-on: obtrace-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          docker build \
            -t ${REGISTRY}/mcp:latest \
            -t ${REGISTRY}/mcp:${SHORT_SHA} .
          docker push ${REGISTRY}/mcp:latest
          docker push ${REGISTRY}/mcp:${SHORT_SHA}

      - name: Restart deployment
        run: kubectl rollout restart deployment/obtrace-mcp -n obtrace
